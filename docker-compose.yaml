services:
  tvguide:
    container_name: tvguide
    image: ghcr.io/n3o2345/EPG_Manager:latest
    environment:
      TZ: ${TZ:-America/Chicago}
      HOST_TZ: ${TZ:-America/Chicago}
      WEBUI_PORT: ${WEBUI_PORT:-5000}
      HTTP_PORT: ${HTTP_PORT:-8282}
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${WEBUI_PORT:-5000}/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./output:/output
      - ./config:/config
